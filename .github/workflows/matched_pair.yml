name: matched-pair

# The right model: calibrate COCOMO II to REPORTED PM (planned FTE x duration) on MATCHED pairs
# (one grant -> one repo -> one reported effort), size = equivalent SLOC, velocity gate OFF, no
# ratio gate. Reports size-only + full fixed-weight COCOMO PM=PM + per-project residuals.
# Restores measurements + attributes from 'census'; publishes reports/matched_pair_pm.json.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  matched:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install numpy
        run: python -m pip install --quiet numpy
      - name: Restore measurements + attributes from 'census'
        run: |
          git fetch origin census
          git checkout origin/census -- data/calibration/measurements_census.csv
          git checkout origin/census -- data/calibration/repo_attributes.csv
      - name: Matched-pair calibration (reported planned PM)
        run: |
          mkdir -p reports
          python scripts/validate/matched_pair_calibrate.py \
            --meas data/calibration/measurements_census.csv \
            --attr data/calibration/repo_attributes.csv \
            --out  reports/matched_pair_pm.json
          echo "=== result ==="; cat reports/matched_pair_pm.json || true
      - name: Publish to 'census'
        run: |
          git config user.name  "matched-bot"
          git config user.email "actions@users.noreply.github.com"
          cp -f reports/matched_pair_pm.json /tmp/matched_pair_pm.json
          git fetch origin census
          git checkout -f -B census origin/census
          mkdir -p reports
          cp -f /tmp/matched_pair_pm.json reports/matched_pair_pm.json
          git add reports/matched_pair_pm.json
          if git diff --cached --quiet; then echo "no change"; else
            git commit -m "ci: matched-pair PM=PM on reported planned PM [skip ci]"
            git push --force-with-lease origin census || git push origin census
          fi
