name: posg-prescreen

# Matched-triple pre-screen over the Polkadot Open Source Developer Grants bounty (diversified source).
# Publishes data/calibration/posg_prescreen.csv to the 'census' branch.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pre-screen POSG grants + deliveries
        run: |
          python scripts/extract/posg_prescreen.py
          echo "=== head ==="; head -50 data/calibration/posg_prescreen.csv || true
      - name: Publish to 'census'
        run: |
          git config user.name  "posg-prescreen-bot"
          git config user.email "actions@users.noreply.github.com"
          cp -f data/calibration/posg_prescreen.csv /tmp/posg_prescreen.csv
          git fetch origin census
          git checkout -f -B census origin/census
          mkdir -p data/calibration
          cp -f /tmp/posg_prescreen.csv data/calibration/posg_prescreen.csv
          git add data/calibration/posg_prescreen.csv
          if git diff --cached --quiet; then echo "no change"; else
            git commit -m "ci: POSG grants matched-triple prescreen [skip ci]"
            git push --force-with-lease origin census || git push origin census
          fi
