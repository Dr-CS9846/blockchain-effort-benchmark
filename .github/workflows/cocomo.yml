name: cocomo-synthesis

# Phase 2 (blockchain COCOMO II) — runs on GitHub for reproducibility.
# (1) Probe each measured repo for objective COCOMO signals -> repo_attributes.csv
# (2) [added next] synthesize all 22 COCOMO II variables + blockchain EMs
# (3) [added next] fit: redundancy (VIF), calibrate A (MLE), ablation, residuals
# Publishes to the NON-authoritative 'census' branch. Dispatch repeatedly to chew batches.

on:
  workflow_dispatch:
    inputs:
      max_rows:
        description: "Max repos to PROBE this run (resumable)"
        required: false
        default: "80"
      force:
        description: "Re-probe already-done rows"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  cocomo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (main = latest scripts)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore measurements + prior attributes from 'census' branch
        run: |
          git fetch origin census
          git checkout origin/census -- data/calibration/measurements_census.csv
          git checkout origin/census -- data/calibration/repo_attributes.csv 2>/dev/null || echo "no prior attributes yet"
          git checkout origin/census -- reports/census_audit.csv 2>/dev/null || echo "no census audit yet"

      - name: Probe repos for objective COCOMO signals (resumable; partial clones)
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then FORCE="--force"; fi
          python scripts/extract/cocomo_probe.py \
            --measurements data/calibration/measurements_census.csv \
            --out data/calibration/repo_attributes.csv \
            --max "${{ github.event.inputs.max_rows || '80' }}" $FORCE

      - name: Synthesize all 22 COCOMO II variables + blockchain EMs, calibrate A (MLE), prove roles
        run: |
          python -m pip install --quiet numpy
          mkdir -p reports
          for PM in pm_mid pm_low pm_high; do
            python scripts/validate/cocomo_fit.py \
              --meas data/calibration/measurements_census.csv \
              --attr data/calibration/repo_attributes.csv \
              --out  reports/cocomo_analysis_${PM}.json \
              --synth-out data/calibration/cocomo_synth_${PM}.csv \
              --pm ${PM} || echo "fit ${PM} skipped (insufficient joined rows)"
            python scripts/validate/cocomo_localcal.py \
              --meas data/calibration/measurements_census.csv \
              --attr data/calibration/repo_attributes.csv \
              --out  reports/cocomo_localcal_${PM}.json \
              --audit reports/census_audit.csv \
              --pm ${PM} || echo "localcal ${PM} skipped"
            python scripts/validate/cocomo_localcal.py \
              --meas data/calibration/measurements_census.csv \
              --attr data/calibration/repo_attributes.csv \
              --out  reports/cocomo_localcal_gated_${PM}.json \
              --audit reports/census_audit.csv \
              --pm ${PM} --maxlocday 200 || echo "localcal gated ${PM} skipped"
          done
          echo "=== local-calibration headline (pm_mid) ==="; cat reports/cocomo_localcal_pm_mid.json 2>/dev/null || true
          cp -f reports/cocomo_analysis_pm_mid.json reports/cocomo_analysis.json 2>/dev/null || true
          cp -f data/calibration/cocomo_synth_pm_mid.csv data/calibration/cocomo_synth.csv 2>/dev/null || true
          echo "=== headline (pm_mid) ==="; cat reports/cocomo_analysis_pm_mid.json 2>/dev/null || true

      - name: Publish attributes + synthesized dataset + analysis to 'census' branch
        run: |
          git config user.name  "cocomo-bot"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p /tmp/pub/data /tmp/pub/reports
          cp -f data/calibration/repo_attributes.csv /tmp/pub/data/ 2>/dev/null || true
          cp -f data/calibration/cocomo_synth*.csv   /tmp/pub/data/ 2>/dev/null || true
          cp -f reports/cocomo_analysis*.json        /tmp/pub/reports/ 2>/dev/null || true
          cp -f reports/cocomo_localcal*.json        /tmp/pub/reports/ 2>/dev/null || true
          cp -f reports/cocomo_localcal_gated*.json  /tmp/pub/reports/ 2>/dev/null || true
          git fetch origin census
          git checkout -f -B census origin/census
          mkdir -p data/calibration reports
          cp -f /tmp/pub/data/*.csv     data/calibration/ 2>/dev/null || true
          cp -f /tmp/pub/reports/*.json reports/          2>/dev/null || true
          git add data/calibration/repo_attributes.csv data/calibration/cocomo_synth*.csv reports/cocomo_analysis*.json reports/cocomo_localcal*.json reports/cocomo_localcal_gated*.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "ci: cocomo synthesis + MLE calibration + redundancy/ablation (non-authoritative) [skip ci]"
            git push --force-with-lease origin census || git push origin census
          fi

      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cocomo-outputs
          path: |
            data/calibration/repo_attributes.csv
            data/calibration/cocomo_synth*.csv
            reports/cocomo_analysis*.json
          if-no-files-found: ignore
