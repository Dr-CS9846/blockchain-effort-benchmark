name: cocomo-bayes

# Bayesian calibration (Chulani-Boehm-Steece) of the blockchain COCOMO II model on the clean
# gated set. Lightweight: restores census measurements + attributes, no clone. Publishes
# reports/cocomo_bayes_{pm}.json to the NON-authoritative 'census' branch.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bayes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install numpy
        run: python -m pip install --quiet numpy
      - name: Restore measurements + attributes from 'census'
        run: |
          git fetch origin census
          git checkout origin/census -- data/calibration/measurements_census.csv
          git checkout origin/census -- data/calibration/repo_attributes.csv
      - name: Bayesian calibration (tau sweep, LOOCV) for each PM bracket
        run: |
          mkdir -p reports
          for PM in pm_mid pm_low pm_high; do
            python scripts/validate/cocomo_bayes.py \
              --meas data/calibration/measurements_census.csv \
              --attr data/calibration/repo_attributes.csv \
              --out  reports/cocomo_bayes_${PM}.json --pm ${PM} || echo "bayes ${PM} skipped"
          done
          echo "=== headline (pm_mid) ==="; cat reports/cocomo_bayes_pm_mid.json 2>/dev/null || true
      - name: Publish to 'census'
        run: |
          git config user.name  "bayes-bot"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p /tmp/b; cp -f reports/cocomo_bayes_*.json /tmp/b/ 2>/dev/null || true
          git fetch origin census
          git checkout -f -B census origin/census
          mkdir -p reports; cp -f /tmp/b/cocomo_bayes_*.json reports/ 2>/dev/null || true
          git add reports/cocomo_bayes_*.json
          if git diff --cached --quiet; then echo "no change"; else
            git commit -m "ci: Bayesian calibration (tau sweep) [skip ci]"
            git push --force-with-lease origin census || git push origin census
          fi
