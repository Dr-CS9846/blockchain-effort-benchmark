name: verify-governance

# Source-verify each remaining governance singleton via the Subsquare API (extract proposer-stated hours).
# Publishes data/calibration/governance_verified.csv to the 'census' branch.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify governance singletons against source
        run: |
          python scripts/extract/verify_governance.py
          echo "=== csv ==="; cat data/calibration/governance_verified.csv || true
      - name: Publish to 'census'
        run: |
          git config user.name  "verify-gov-bot"
          git config user.email "actions@users.noreply.github.com"
          cp -f data/calibration/governance_verified.csv /tmp/gv.csv
          git fetch origin census
          git checkout -f -B census origin/census
          mkdir -p data/calibration
          cp -f /tmp/gv.csv data/calibration/governance_verified.csv
          git add data/calibration/governance_verified.csv
          if git diff --cached --quiet; then echo "no change"; else
            git commit -m "ci: source-verify governance singletons [skip ci]"
            git push --force-with-lease origin census || git push origin census
          fi
