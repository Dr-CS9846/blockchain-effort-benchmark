name: crust-prescreen

# Matched-triple pre-screen over the Crust Grants Program (diversified, non-W3F source).
# Publishes data/calibration/crust_prescreen.csv to the 'census' branch.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pre-screen Crust grants + deliveries
        run: |
          python scripts/extract/crust_prescreen.py
          echo "=== head ==="; head -40 data/calibration/crust_prescreen.csv || true
      - name: Publish to 'census'
        run: |
          git config user.name  "crust-prescreen-bot"
          git config user.email "actions@users.noreply.github.com"
          cp -f data/calibration/crust_prescreen.csv /tmp/crust_prescreen.csv
          git fetch origin census
          git checkout -f -B census origin/census
          mkdir -p data/calibration
          cp -f /tmp/crust_prescreen.csv data/calibration/crust_prescreen.csv
          git add data/calibration/crust_prescreen.csv
          if git diff --cached --quiet; then echo "no change"; else
            git commit -m "ci: Crust grants matched-triple prescreen [skip ci]"
            git push --force-with-lease origin census || git push origin census
          fi
