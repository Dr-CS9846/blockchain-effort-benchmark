name: effort-truth

# Boehm-style effort-ground-truth reconciliation (git vs planned-FTE vs paid-cost).
# Lightweight: reads the census measurements, no clone. Publishes reports/effort_truth.json
# to the NON-authoritative 'census' branch.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install numpy
        run: python -m pip install --quiet numpy
      - name: Restore measurements from 'census'
        run: |
          git fetch origin census
          git checkout origin/census -- data/calibration/measurements_census.csv
      - name: Reconcile effort ground truth
        run: |
          mkdir -p reports
          python scripts/validate/effort_truth.py \
            --meas data/calibration/measurements_census.csv \
            --out  reports/effort_truth.json
      - name: Publish to 'census'
        run: |
          git config user.name  "effort-bot"
          git config user.email "actions@users.noreply.github.com"
          cp -f reports/effort_truth.json /tmp/effort_truth.json
          git fetch origin census
          git checkout -f -B census origin/census
          mkdir -p reports
          cp -f /tmp/effort_truth.json reports/effort_truth.json
          git add reports/effort_truth.json
          if git diff --cached --quiet; then echo "no change"; else
            git commit -m "ci: effort ground-truth reconciliation [skip ci]"
            git push --force-with-lease origin census || git push origin census
          fi
