name: target-compare

# Don't fight the noise floor - change the target. Tests which effort target (git PM vs
# human-stated planned PM vs paid cost PM) is most predictable from size, under one LOOCV
# protocol. Restores measurements + attributes from 'census'. Publishes
# reports/target_compare.json to the NON-authoritative 'census' branch.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install numpy
        run: python -m pip install --quiet numpy
      - name: Restore measurements + attributes from 'census'
        run: |
          git fetch origin census
          git checkout origin/census -- data/calibration/measurements_census.csv
          git checkout origin/census -- data/calibration/repo_attributes.csv
      - name: Compare target predictability (git vs planned vs cost)
        run: |
          mkdir -p reports
          python scripts/validate/target_compare.py \
            --meas data/calibration/measurements_census.csv \
            --attr data/calibration/repo_attributes.csv \
            --out  reports/target_compare.json
          echo "=== result ==="; cat reports/target_compare.json || true
      - name: Publish to 'census'
        run: |
          git config user.name  "target-bot"
          git config user.email "actions@users.noreply.github.com"
          cp -f reports/target_compare.json /tmp/target_compare.json
          git fetch origin census
          git checkout -f -B census origin/census
          mkdir -p reports
          cp -f /tmp/target_compare.json reports/target_compare.json
          git add reports/target_compare.json
          if git diff --cached --quiet; then echo "no change"; else
            git commit -m "ci: target predictability comparison (git vs planned vs cost) [skip ci]"
            git push --force-with-lease origin census || git push origin census
          fi
