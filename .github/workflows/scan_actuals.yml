name: scan-actuals

# Mine ACTUAL logged effort from W3F milestone-DELIVERY documents (time-spent tables required by grant rules).
# Publishes data/calibration/delivery_actuals.csv to the 'census' branch.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan delivery docs for actual effort
        run: |
          python scripts/extract/scan_actual_effort.py
          echo "=== head ==="; head -30 data/calibration/delivery_actuals.csv || true
      - name: Publish to 'census'
        run: |
          git config user.name  "scan-actuals-bot"
          git config user.email "actions@users.noreply.github.com"
          cp -f data/calibration/delivery_actuals.csv /tmp/delivery_actuals.csv
          git fetch origin census
          git checkout -f -B census origin/census
          mkdir -p data/calibration
          cp -f /tmp/delivery_actuals.csv data/calibration/delivery_actuals.csv
          git add data/calibration/delivery_actuals.csv
          if git diff --cached --quiet; then echo "no change"; else
            git commit -m "ci: actual-effort scan of W3F delivery docs [skip ci]"
            git push --force-with-lease origin census || git push origin census
          fi
